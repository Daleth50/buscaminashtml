<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscaminas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #d9d9d9;
            color: #000;
            margin: 0;
            padding: 8px;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 26px;
            color: #111;
        }

        #config-panel,
        #hud,
        #board,
        #leaderboard,
        #message-box {
            background: #efefef;
            border: 1px solid #888;
            border-radius: 0;
        }

        #config-panel {
            max-width: 560px;
            padding: 8px;
            margin-bottom: 8px;
        }

        #config-panel h2,
        #leaderboard h2 {
            margin: 0 0 6px 0;
            font-size: 14px;
            color: #111;
            text-transform: none;
            letter-spacing: 0;
        }

        .difficulty-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 6px;
        }

        .diff-btn,
        #start-btn,
        #reset-btn,
        #message-box button,
        #clear-scores-btn {
            border: 1px solid #555;
            background: #ddd;
            color: #111;
            border-radius: 0;
            padding: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .diff-btn.active {
            background: #cfcfcf;
            font-weight: bold;
        }

        #custom-fields {
            display: none;
            gap: 6px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        #custom-fields.visible {
            display: flex;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            min-width: 70px;
        }

        .field-group label {
            font-size: 11px;
            margin-bottom: 2px;
        }

        .field-group input {
            border: 1px solid #777;
            border-radius: 0;
            padding: 3px;
            width: 100%;
            background: #fff;
            color: #000;
        }

        #hud {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 6px;
            margin-bottom: 8px;
            max-width: 560px;
        }

        .hud-item span:first-child {
            margin-right: 4px;
            color: #333;
        }

        #game-container {
            display: block;
            width: 100%;
            margin-bottom: 8px;
        }

        #board-wrapper {
            overflow: auto;
            max-width: 100%;
        }

        #board {
            display: inline-grid;
            gap: 1px;
            padding: 5px;
        }

        .cell {
            width: 28px;
            height: 28px;
            border: 1px solid #777;
            background: #c8c8c8;
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .cell:hover:not(.revealed):not(.flagged) {
            background: #bbb;
        }

        .cell.revealed {
            background: #f5f5f5;
            cursor: default;
        }

        .cell.mine-exploded {
            background: #ff8c8c !important;
        }

        .cell.mine-shown {
            background: #f0b0b0;
        }

        .cell.flagged {
            background: #ffe58f;
        }

        .n1 { color: blue; }
        .n2 { color: green; }
        .n3 { color: red; }
        .n4 { color: navy; }
        .n5 { color: brown; }
        .n6 { color: teal; }
        .n7 { color: purple; }
        .n8 { color: gray; }

        #leaderboard {
            max-width: 560px;
            padding: 8px;
        }

        #scores-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        #scores-table th,
        #scores-table td {
            border: 1px solid #aaa;
            padding: 4px;
            text-align: left;
        }

        #message {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        #message.visible {
            display: flex;
        }

        #message-box {
            padding: 16px;
            text-align: center;
            width: 280px;
        }

        #message-box h2 {
            margin: 0 0 8px 0;
            font-size: 20px;
        }

        #message-box p {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <h1>Buscaminas</h1>

    <div id="config-panel">
        <h2>Dificultad</h2>
        <div class="difficulty-buttons">
            <button class="diff-btn active" data-level="easy">Fácil<br><small>9×9 · 10 minas</small></button>
            <button class="diff-btn" data-level="medium">Medio<br><small>16×16 · 40 minas</small></button>
            <button class="diff-btn" data-level="hard">Difícil<br><small>16×30 · 99 minas</small></button>
            <button class="diff-btn" data-level="custom">Personalizado</button>
        </div>

        <div id="custom-fields">
            <div class="field-group">
                <label>Filas</label>
                <input type="number" id="custom-rows" value="10" min="2" max="30">
            </div>
            <div class="field-group">
                <label>Columnas</label>
                <input type="number" id="custom-cols" value="10" min="2" max="50">
            </div>
            <div class="field-group">
                <label>Minas</label>
                <input type="number" id="custom-mines" value="15" min="1" max="500">
            </div>
            <button id="start-btn">Iniciar</button>
        </div>
    </div>

    <div id="hud">
        <div class="hud-item"><span>Minas:</span><span id="mines-left">0</span></div>
        <button id="reset-btn" title="Reiniciar">Reiniciar</button>
        <div class="hud-item"><span>Tiempo:</span><span id="timer">0</span>s</div>
    </div>

    <div id="game-container">
        <div id="board-wrapper">
            <div id="board"></div>
        </div>
    </div>
    <div id="leaderboard">
        <h2>Mejores tiempos</h2>
        <table id="scores-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nivel</th>
                    <th>Tiempo</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody id="scores-body"></tbody>
        </table>
        <button id="clear-scores-btn">Limpiar todo</button>
    </div>

    <div id="message">
        <div id="message-box">
            <h2 id="msg-title"></h2>
            <p id="msg-body"></p>
            <button id="msg-reset-btn">Jugar de nuevo</button>
        </div>
    </div>

    <script src="js/index.js"></script>
</body>

</html>
